name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
